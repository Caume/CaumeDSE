components:
  parameters:
    organization:
      name: organization
      in: path
      required: true
      schema:
        type: string
      description: Organization resource identifier from the URL.
    user:
      name: user
      in: path
      required: true
      schema:
        type: string
      description: User resource identifier from the URL.
    roleTable:
      name: roleTable
      in: path
      required: true
      schema:
        type: string
      description: Role table resource identifier such as users or documents.
    filterUser:
      name: filterUser
      in: path
      required: true
      schema:
        type: string
      description: Whitelist or blacklist user-resource filter, interpreted as a POSIX extended regular expression.
    storage:
      name: storage
      in: path
      required: true
      schema:
        type: string
      description: Storage resource identifier from the URL.
    documentType:
      name: documentType
      in: path
      required: true
      schema:
        type: string
        enum:
          - file.csv
          - file.raw
          - file.txt
          - file.json
          - file.xml
          - file.html
          - file.pdf
          - file.png
          - file.jpg
          - file.gif
          - file.zip
          - file.bin
          - script.perl
          - script.python
      description: Supported document type identifier.
    document:
      name: document
      in: path
      required: true
      schema:
        type: string
      description: Document resource identifier.
    contentRow:
      name: contentRow
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: 1-based content row selector.
    contentColumn:
      name: contentColumn
      in: path
      required: true
      schema:
        type: string
      description: CSV content column name.
    parserScript:
      name: parserScript
      in: path
      required: true
      schema:
        type: string
      description: Stored script.perl or script.python document name.
    dbName:
      name: dbName
      in: path
      required: true
      schema:
        type: string
      description: Registered file.csv document database name.
    dbTable:
      name: dbTable
      in: path
      required: true
      schema:
        type: string
        enum: [data, meta]
      description: Exposed secure CSV table name.
    tableRow:
      name: tableRow
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: 1-based table row selector.
    tableColumn:
      name: tableColumn
      in: path
      required: true
      schema:
        type: string
      description: Exposed secure CSV table column name.
    userId:
      name: userId
      in: query
      required: true
      schema:
        type: string
      description: Authenticated CaumeDSE user identifier.
    orgId:
      name: orgId
      in: query
      required: true
      schema:
        type: string
      description: Authenticated CaumeDSE organization identifier.
    orgKey:
      name: orgKey
      in: query
      required: true
      schema:
        type: string
        format: password
      description: Organization key. Treat as a secret.
    newOrgKey:
      name: newOrgKey
      in: query
      required: false
      schema:
        type: string
        format: password
      description: Key used for creating or rewriting protected resources.
    outputType:
      name: outputType
      in: query
      required: false
      schema:
        type: string
        enum: [html, csv]
      description: Requested response format supported by current handlers.
    matchPublicKey:
      name: _publicKey
      in: query
      required: false
      schema:
        type: string
      description: Exact-match filter for publicKey.
    storageTypeMatch:
      name: _type
      in: query
      required: false
      schema:
        type: string
      description: Exact-match filter for storage type.
    resourceInfoUpdate:
      name: "*resourceInfo"
      in: query
      required: false
      schema:
        type: string
      description: Resource information update value.
    certificateUpdate:
      name: "*certificate"
      in: query
      required: false
      schema:
        type: string
      description: Certificate update value.
    publicKeyUpdate:
      name: "*publicKey"
      in: query
      required: false
      schema:
        type: string
      description: Public key update value.
    basicAuthPwdHashUpdate:
      name: "*basicAuthPwdHash"
      in: query
      required: false
      schema:
        type: string
      description: Basic-auth password hash update value.
    oauthConsumerKeyUpdate:
      name: "*oauthConsumerKey"
      in: query
      required: false
      schema:
        type: string
      description: External OAuth consumer key metadata.
    oauthConsumerSecretUpdate:
      name: "*oauthConsumerSecret"
      in: query
      required: false
      schema:
        type: string
        format: password
      description: External OAuth consumer secret metadata.
    locationUpdate:
      name: "*location"
      in: query
      required: false
      schema:
        type: string
      description: Storage location update value.
    storageTypeUpdate:
      name: "*type"
      in: query
      required: false
      schema:
        type: string
      description: Storage provider type. Current local storage uses local.
    accessPathUpdate:
      name: "*accessPath"
      in: query
      required: false
      schema:
        type: string
      description: Storage access path.
    accessUserUpdate:
      name: "*accessUser"
      in: query
      required: false
      schema:
        type: string
      description: Storage access user metadata.
    accessPasswordUpdate:
      name: "*accessPassword"
      in: query
      required: false
      schema:
        type: string
        format: password
      description: Storage access password metadata.
    methodGetUpdate:
      name: "*_get"
      in: query
      required: false
      schema:
        type: integer
        enum: [0, 1]
      description: Allow or deny GET depending on role/filter resource type.
    methodPostUpdate:
      name: "*_post"
      in: query
      required: false
      schema:
        type: integer
        enum: [0, 1]
      description: Allow or deny POST depending on role/filter resource type.
    methodPutUpdate:
      name: "*_put"
      in: query
      required: false
      schema:
        type: integer
        enum: [0, 1]
      description: Allow or deny PUT depending on role/filter resource type.
    methodDeleteUpdate:
      name: "*_delete"
      in: query
      required: false
      schema:
        type: integer
        enum: [0, 1]
      description: Allow or deny DELETE depending on role/filter resource type.
    methodHeadUpdate:
      name: "*_head"
      in: query
      required: false
      schema:
        type: integer
        enum: [0, 1]
      description: Allow or deny HEAD depending on role/filter resource type.
    methodOptionsUpdate:
      name: "*_options"
      in: query
      required: false
      schema:
        type: integer
        enum: [0, 1]
      description: Allow or deny OPTIONS depending on role/filter resource type.

  schemas:
    TextTable:
      type: string
      description: HTML or CSV-style table text returned by current handlers.
    DocumentUpload:
      type: object
      required: [file, userId, orgId, orgKey]
      properties:
        file:
          type: string
          format: binary
        userId:
          type: string
        orgId:
          type: string
        orgKey:
          type: string
          format: password
        newOrgKey:
          type: string
          format: password
        "*resourceInfo":
          type: string
        shuffle:
          type: string
          description: Optional secure CSV import flag.
        protect:
          type: string
          description: Optional secure CSV import flag.
        replaceDB:
          type: string
          description: Optional secure CSV import flag.
        vacuumDB:
          type: string
          description: Optional secure CSV import flag.

  responses:
    TableResponse:
      description: Matching resources as an HTML or CSV-style table.
      headers:
        Engine-results:
          schema:
            type: integer
          description: Number of matching result registers.
      content:
        text/html:
          schema:
            $ref: "#/components/schemas/TextTable"
        text/csv:
          schema:
            type: string
    CsvResponse:
      description: CSV-formatted response body.
      headers:
        Engine-results:
          schema:
            type: integer
      content:
        text/csv:
          schema:
            type: string
        text/plain:
          schema:
            type: string
    FileContentResponse:
      description: Reconstructed document content.
      headers:
        Engine-results:
          schema:
            type: integer
      content:
        text/csv:
          schema:
            type: string
        text/plain:
          schema:
            type: string
        application/octet-stream:
          schema:
            type: string
            format: binary
    TextResponse:
      description: Text response.
      content:
        text/plain:
          schema:
            type: string
        text/html:
          schema:
            type: string
    CountResponse:
      description: Operation result count.
      headers:
        Engine-results:
          schema:
            type: integer
      content:
        text/plain:
          schema:
            type: string
        text/html:
          schema:
            type: string
        text/csv:
          schema:
            type: string
    HeaderOnly:
      description: Status and response headers only.
      headers:
        Engine-results:
          schema:
            type: integer
    Created:
      description: Resource created.
      content:
        text/plain:
          schema:
            type: string
    Unauthorized:
      description: Missing or invalid credentials, organization key, or HTTPS client certificate.
      content:
        text/plain:
          schema:
            type: string
    Forbidden:
      description: Authenticated caller is not authorized or selector is invalid.
      content:
        text/plain:
          schema:
            type: string
    NotFound:
      description: Requested resource was not found.
      content:
        text/plain:
          schema:
            type: string
    Conflict:
      description: Request conflicts with current resource state.
      content:
        text/plain:
          schema:
            type: string
    ServerError:
      description: Server-side processing failed.
      content:
        text/plain:
          schema:
            type: string
